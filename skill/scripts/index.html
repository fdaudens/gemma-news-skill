<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Briefing</title>
  </head>
  <body>
    <script>
      const RSS_FEEDS = {
        nytimes: {
          name: "The New York Times",
          fetchMode: "rss",
          feeds: {
            general: "https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml",
            technology: "https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml",
            politics: "https://rss.nytimes.com/services/xml/rss/nyt/Politics.xml",
            health: "https://rss.nytimes.com/services/xml/rss/nyt/Health.xml",
            science: "https://rss.nytimes.com/services/xml/rss/nyt/Science.xml",
            business: "https://rss.nytimes.com/services/xml/rss/nyt/Business.xml",
            sports: "https://rss.nytimes.com/services/xml/rss/nyt/Sports.xml",
            world: "https://rss.nytimes.com/services/xml/rss/nyt/World.xml",
          },
        },
        washingtonpost: {
          name: "The Washington Post",
          fetchMode: "rss2json",
          feeds: {
            general: "https://feeds.washingtonpost.com/rss/homepage",
            politics: "https://feeds.washingtonpost.com/rss/politics",
            business: "https://feeds.washingtonpost.com/rss/business",
            world: "https://feeds.washingtonpost.com/rss/world",
          },
        },
      };

      const SOURCE_ALIASES = {
        nyt: "nytimes",
        "new york times": "nytimes",
        newyorktimes: "nytimes",
        wapo: "washingtonpost",
        wp: "washingtonpost",
        "washington post": "washingtonpost",
        "washington-post": "washingtonpost",
      };

      // Map common topic aliases to feed keys
      const TOPIC_ALIASES = {
        ai: "ai",
        "artificial intelligence": "ai",
        tech: "technology",
        sport: "sports",
        sci: "science",
        finance: "business",
        money: "business",
        arts: "entertainment",
        culture: "entertainment",
      };

      function normalizeTopic(topic) {
        if (!topic) return "general";
        const lower = topic.toLowerCase().trim();
        return TOPIC_ALIASES[lower] || lower;
      }

      function normalizeSource(source) {
        if (!source) return null;
        const lower = source.toLowerCase().trim();
        return SOURCE_ALIASES[lower] || lower;
      }

      function getFeedUrl(sourceKey, topic) {
        const source = RSS_FEEDS[sourceKey];
        if (!source) return null;
        return source.feeds[topic] || source.feeds["general"];
      }

      function getTopicFeedKey(sourceKey, topic) {
        const source = RSS_FEEDS[sourceKey];
        if (!source) return null;
        if (source.feeds[topic]) return topic;
        if (topic === "ai" && source.feeds.technology) return "technology";
        return "general";
      }

      function parseRSSItems(xmlText) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(xmlText, "text/xml");
        const items = doc.querySelectorAll("item");
        const results = [];

        for (let i = 0; i < items.length; i++) {
          const item = items[i];
          const title = item.querySelector("title")?.textContent?.trim() || "";
          const link = item.querySelector("link")?.textContent?.trim() || "";
          const description =
            item.querySelector("description")?.textContent?.trim() || "";
          const pubDate = item.querySelector("pubDate")?.textContent?.trim() || "";

          // Strip HTML tags from description
          const cleanDesc = description.replace(/<[^>]*>/g, "").trim();

          results.push({
            title,
            link,
            description: cleanDesc.length > 200
              ? cleanDesc.substring(0, 200) + "..."
              : cleanDesc,
            pubDate,
          });
        }
        return results;
      }

      function parseJsonFeedItems(jsonData) {
        const items = Array.isArray(jsonData.items) ? jsonData.items : [];
        return items.map((item) => {
          const description = (item.description || item.contentSnippet || "").trim();
          const cleanDesc = description.replace(/<[^>]*>/g, "").trim();

          return {
            title: (item.title || "").trim(),
            link: (item.link || "").trim(),
            description: cleanDesc.length > 200
              ? cleanDesc.substring(0, 200) + "..."
              : cleanDesc,
            pubDate: (item.pubDate || item.published || "").trim(),
          };
        });
      }

      function escapeRegExp(value) {
        return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function getTopicPatterns(topic) {
        if (!topic || topic === "general") return [];
        if (topic === "ai") {
          return [/\bai\b/i, /\ba\.i\.\b/i, /artificial intelligence/i];
        }

        const escaped = escapeRegExp(topic.trim()).replace(/\s+/g, "\\s+");
        return [new RegExp(`\\b${escaped}\\b`, "i")];
      }

      function filterArticlesByTopic(articles, topic) {
        if (!topic || topic === "general") return articles;
        const patterns = getTopicPatterns(topic);
        return articles.filter((article) => {
          const haystack = `${article.title} ${article.description}`;
          return patterns.some((pattern) => pattern.test(haystack));
        });
      }

      async function fetchFeed(sourceKey, topic, limit) {
        const feedKey = getTopicFeedKey(sourceKey, topic);
        const url = getFeedUrl(sourceKey, feedKey);
        if (!url) {
          return { source: sourceKey, error: `Unknown source: ${sourceKey}` };
        }

        const sourceName = RSS_FEEDS[sourceKey].name;
        const needsKeywordFilter = topic !== "general" && feedKey !== topic;

        try {
          if (RSS_FEEDS[sourceKey].fetchMode === "rss2json") {
            const response = await fetch(
              `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`
            );
            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            const jsonData = await response.json();
            if (jsonData.status !== "ok") {
              throw new Error(jsonData.message || "Failed to parse feed.");
            }

            const items = filterArticlesByTopic(parseJsonFeedItems(jsonData), topic)
              .slice(0, limit);
            if (items.length === 0) {
              return {
                source: sourceName,
                sourceKey,
                error: needsKeywordFilter
                  ? `No articles found matching topic: ${topic}.`
                  : "No articles found in the feed.",
              };
            }

            return { source: sourceName, sourceKey, articles: items };
          }

          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const xmlText = await response.text();
          const items = filterArticlesByTopic(parseRSSItems(xmlText), topic)
            .slice(0, limit);

          if (items.length === 0) {
            return {
              source: sourceName,
              sourceKey,
              error: needsKeywordFilter
                ? `No articles found matching topic: ${topic}.`
                : "No articles found in the feed.",
            };
          }

          return { source: sourceName, sourceKey, articles: items };
        } catch (e) {
          return {
            source: sourceName,
            sourceKey,
            error: `Failed to fetch feed: ${e.message}`,
          };
        }
      }

      window["ai_edge_gallery_get_result"] = async (data) => {
        try {
          const jsonData = JSON.parse(data);
          const requestedSources = Array.isArray(jsonData.sources)
            ? jsonData.sources
            : ["nytimes", "washingtonpost"];
          const sources = requestedSources
            .map(normalizeSource)
            .filter((source, index, list) =>
              source && RSS_FEEDS[source] && list.indexOf(source) === index
            );
          const topic = normalizeTopic(jsonData.topic);
          const limit = jsonData.limit || 5;

          if (sources.length === 0) {
            return JSON.stringify({
              error:
                'No valid sources provided. Valid sources are: "nytimes", "washingtonpost".',
            });
          }

          const feedPromises = sources.map((s) =>
            fetchFeed(s.toLowerCase(), topic, limit)
          );
          const results = await Promise.all(feedPromises);

          // Build text result for the LLM
          let textResult = `News Briefing \u2014 Topic: ${topic === "general" ? "Top Stories" : topic}\n`;
          textResult += `Sources: ${sources.join(", ")}\n\n`;

          for (const feed of results) {
            textResult += `=== ${feed.source} ===\n`;
            if (feed.error) {
              textResult += `  Error: ${feed.error}\n\n`;
              continue;
            }
            for (const article of feed.articles) {
              textResult += `\u2022 ${article.title}\n`;
              if (article.description) {
                textResult += `  ${article.description}\n`;
              }
              if (article.link) {
                textResult += `  Link: ${article.link}\n`;
              }
              if (article.pubDate) {
                textResult += `  Published: ${article.pubDate}\n`;
              }
              textResult += "\n";
            }
          }

          // Build webview data
          const webviewData = encodeURIComponent(JSON.stringify(results));

          // Cap total output
          if (textResult.length > 8000) {
            textResult =
              textResult.substring(0, 8000) +
              "\n\n... [TRUNCATED TO SAVE CONTEXT]";
          }

          return JSON.stringify({
            result: textResult,
            webview: {
              url: `webview.html?data=${webviewData}&topic=${encodeURIComponent(topic)}`,
              aspectRatio: 1.5,
            },
          });
        } catch (e) {
          console.error(e);
          return JSON.stringify({
            error: `Failed to fetch news: ${e.message}`,
          });
        }
      };
    </script>
  </body>
</html>
